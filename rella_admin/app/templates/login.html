<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rella Admin Login</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #fdfdfd, #f3f0ff);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(100,70,255,0.15);
            padding: 40px;
            width: 320px;
            text-align: center;
        }

        h2 {
            color: #4b6cff;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid rgba(180,190,255,0.6);
            outline: none;
        }

        input:focus {
            border-color: #4b6cff;
        }

        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #4b6cff, #9b5bff);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: linear-gradient(135deg, #5c7cff, #a86cff);
        }

        .flash {
            color: #ff4b4b;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Rella Admin Login</h2>
        <form method="POST">
		    <input type="text" name="username" placeholder="Username" required>
		    <input type="password" name="password" placeholder="Password" required>
		    <button type="submit">Login</button>
		</form>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
    </div>
</body>
</html>
