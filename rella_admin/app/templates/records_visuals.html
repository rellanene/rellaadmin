<canvas id="salesChart" height="120"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const ctx = document.getElementById('salesChart').getContext('2d');
const chartData = {
  labels: {{ data | map(attribute='date') | list | tojson }},
  datasets: [{
    label: 'Total Sales',
    data: {{ data | map(attribute='total_sales') | list | tojson }},
    backgroundColor: 'rgba(75,108,255,0.4)',
    borderColor: '#4b6cff',
    borderWidth: 2,
    fill: true,
    tension: 0.3
  }]
};

new Chart(ctx, {
  type: 'line',
  data: chartData,
  options: {
    responsive: true,
    plugins: {
      legend: { display: true, position: 'bottom' }
    },
    scales: {
      y: { beginAtZero: true }
    }
  }
});
</script>
